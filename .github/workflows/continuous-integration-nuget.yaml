name: .NET 10 Continuous Integration with GitHub, GitHub Actions and Nuget Packages.

on:
  push:
    branches: main
    
jobs:
  build:
  
    runs-on: ubuntu-latest  

    steps:
    - name: Checkout
      uses: actions/checkout@v4


    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
